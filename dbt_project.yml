# dbt_project.yml
name: 'european_soccer'
version: '1.0.0'
config-version: 2

profile: 'european_soccer'   

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  european_soccer:
    staging:
      +materialized: view      
      +schema: staging        

    core:
      dimensions:
        +materialized: table   
        +schema: core
      facts:
        +materialized: table   
        +schema: core

    marts:
      +materialized: table     
      +schema: marts
      kpis:
        +materialized: view    
        +schema: marts